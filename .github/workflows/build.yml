name: Build and Push PocketBase Image

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force rebuild even if image exists"
        type: boolean
        default: false

env:
  IMAGE_NAME: pocketbase

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}

    steps:
      - name: Check for new PocketBase version
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/pocketbase/pocketbase/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "version=${LATEST}" >> $GITHUB_OUTPUT

          if [ "${{ inputs.force_build }}" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Force rebuild triggered for PocketBase ${LATEST}"
            exit 0
          fi

          CURRENT=""
          if manifest=$(docker manifest inspect ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${LATEST} 2>/dev/null); then
            CURRENT="${LATEST}"
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "PocketBase ${LATEST} already built, skipping."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New PocketBase version found: ${LATEST}"
          fi

  build-and-push:
    needs: check-and-build
    if: needs.check-and-build.outputs.changed == 'true'
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.check-and-build.outputs.version }}
          build-args: |
            PB_VERSION=${{ needs.check-and-build.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max